<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rahel & Sebastian</title>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">


<link rel="stylesheet" href="style.css">

</head>



<body>


<!-- INTRO -->

<section id="intro">

    <div class="intro-content">

        <h1>
            Rahel & Sebastian
        </h1>

        <div class="heart">
            ♥
        </div>

    </div>

</section>



<!-- HAUPTBEREICH -->

<main id="main-content">


    <!-- Blüten werden per JavaScript erzeugt -->
    <div id="petal-container"></div>



    <section class="card">


        <h2>
            „Was mit Vorfreude begann, wird nun zu einer Erinnerung.“
        </h2>


        



        <div id="countdown">



            <div class="time-box">

                <div class="flip-card">

                    <span id="days">
                        00
                    </span>

                </div>

                <small>
                    Tage
                </small>

            </div>




            <div class="time-box">

                <div class="flip-card">

                    <span id="hours">
                        00
                    </span>

                </div>

                <small>
                    Stunden
                </small>

            </div>




            <div class="time-box">

                <div class="flip-card">

                    <span id="minutes">
                        00
                    </span>

                </div>

                <small>
                    Minuten
                </small>

            </div>




            <div class="time-box">

                <div class="flip-card">

                    <span id="seconds">
                        00
                    </span>

                </div>

                <small>
                    Sekunden
                </small>

            </div>



        </div>



        <button id="continue-button">

            Hier geht es weiter

        </button>



    </section>


</main>




<script src="script.js"></script>


</body>

</html>
